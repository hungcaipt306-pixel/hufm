services:
  - type: web
    name: hue-forest-manager
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_NAME
        value: Quản trị hệ thống
      - key: ADMIN_EMAIL
        value: admin@kiemlamhue.gov.vn
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: hue-forest-db
          property: connectionString

databases:
  - name: hue-forest-db
    plan: free
